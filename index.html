<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>ROBLOX NEXT-GEN - 메타버스 런처 & R15 고화질 엔진</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --bg-main: #0B0C0E;
            --bg-panel: #1B1D22;
            --bg-card: #252830;
            --text-color: #FFFFFF;
            --accent-blue: #0084FF;
            --accent-green: #00E676;
            --accent-red: #FF3366;
        }

        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-main); color: var(--text-color); user-select: none; overflow-x: hidden; }
        
        /* 프리미엄 상단 헤더 */
        header { background: var(--bg-panel); height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); position: relative; z-index: 20; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo { font-size: 24px; font-weight: 900; color: #FFF; letter-spacing: -1.5px; text-transform: uppercase; }
        .user-tag { background: rgba(0, 132, 255, 0.15); border: 1px solid var(--accent-blue); padding: 8px 18px; border-radius: 20px; font-size: 13px; font-weight: bold; color: #00f2ff; box-shadow: 0 0 10px rgba(0,242,255,0.2); }

        /* 고급 인증 레이어 */
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: radial-gradient(circle, #1b1d22 0%, #0b0c0e 100%); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .auth-box { background: var(--bg-panel); padding: 45px; border-radius: 16px; width: 360px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.05); }
        .auth-box h2 { margin-top: 0; font-size: 28px; color: #FFF; font-weight: 800; letter-spacing: -1px; }
        input { width: 100%; padding: 14px; margin: 12px 0; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; box-sizing: border-box; background: var(--bg-main); color: #FFF; font-size: 14px; transition: 0.3s; }
        input:focus { border-color: var(--accent-blue); outline: none; box-shadow: 0 0 8px rgba(0,132,255,0.4); }
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 6px 0; font-size: 15px; transition: 0.2s; transform: translateY(0); }
        button:active { transform: translateY(2px); }
        .btn-blue { background: var(--accent-blue); color: white; }
        .btn-green { background: var(--accent-green); color: #000; }

        /* 메인 홈 레이아웃 그리드 시스템 */
        #web-home { max-width: 1300px; margin: 0 auto; padding: 35px 20px; display: grid; grid-template-columns: 1fr 340px; gap: 30px; }
        .section-title { font-size: 24px; font-weight: 800; margin-bottom: 20px; letter-spacing: -0.5px; border-left: 5px solid var(--accent-blue); padding-left: 12px; }

        /* 우측 프리미엄 소셜 센터 */
        .friends-panel { background: var(--bg-panel); border-radius: 14px; padding: 24px; box-shadow: 0 8px 30px rgba(0,0,0,0.3); height: calc(100vh - 160px); overflow-y: auto; border: 1px solid rgba(255,255,255,0.03); }
        .friend-search-box { display: flex; gap: 8px; margin-bottom: 20px; }
        .friend-search-box input { margin: 0; padding: 12px; }
        .friend-search-box button { width: 75px; margin: 0; background: var(--accent-blue); color: white; border-radius: 8px; }
        .friend-list { list-style: none; padding: 0; margin: 0; }
        .friend-item { display: flex; align-items: center; justify-content: space-between; background: var(--bg-card); padding: 14px; border-radius: 10px; margin-bottom: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-left: 4px solid #444; transition: 0.2s; }
        .friend-item.online { border-left-color: var(--accent-green); }
        .friend-name { font-size: 15px; font-weight: bold; }
        .friend-status { font-size: 12px; color: #aaa; margin-top: 2px; }
        .req-buttons { display: flex; gap: 6px; }
        .btn-sm-accept { background: var(--accent-green); color: #000; width: 50px; padding: 8px 0; font-size: 12px; border-radius: 6px; }
        .btn-sm-decline { background: var(--accent-red); color: white; width: 50px; padding: 8px 0; font-size: 12px; border-radius: 6px; }

        /* 하이엔드 게임 카드 디자인 구조 */
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-bottom: 35px; }
        .game-card { background: var(--bg-panel); border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); border: 1px solid rgba(255,255,255,0.03); box-shadow: 0 10px 20px rgba(0,0,0,0.2); position: relative; }
        .game-card:hover { transform: translateY(-8px); border-color: var(--accent-blue); box-shadow: 0 15px 30px rgba(0,132,255,0.25); }
        .game-thumb { height: 130px; display: flex; align-items: center; justify-content: center; font-size: 55px; position: relative; }
        .game-info { padding: 15px; background: rgba(0,0,0,0.2); }
        .game-name { font-size: 16px; font-weight: bold; margin: 0 0 6px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .game-stats { font-size: 12px; color: #a0a5b5; display: flex; justify-content: space-between; align-items: center; }
        .rating { color: #FFD700; font-weight: bold; }

        /* 3D 인게임 컨테이너 및 콕핏 셋업 */
        #game-container { width: 100vw; height: 100vh; display: none; position: absolute; top: 0; left: 0; z-index: 1; }
        #chat-ui { position: fixed; bottom: 25px; left: 25px; width: 380px; z-index: 30; display: none; }
        #chat-messages { height: 180px; background: rgba(11,12,14,0.75); color: white; overflow-y: auto; padding: 12px; border-radius: 8px; list-style: none; margin: 0; font-size: 14px; border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(10px); }
        #chat-input-box { display: flex; margin-top: 8px; }
        #chat-input { flex: 1; padding: 12px; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px 0 0 8px; margin: 0; background: rgba(0,0,0,0.6); color: #fff; }
        #chat-send { width: 75px; border-radius: 0 8px 8px 0; background: var(--accent-blue); color: white; margin: 0; }
        #back-to-home { position: fixed; top: 80px; left: 25px; z-index: 30; width: 140px; background: var(--accent-red); color: white; display: none; border-radius: 8px; font-weight: bold; box-shadow: 0 4px 15px rgba(255,51,102,0.3); }
    </style>
</head>
<body>

<header>
    <div class="logo">⚡ ROBLOX STUDIO 2026</div>
    <div id="user-display" class="user-tag">계정 연동 대기중</div>
</header>

<div id="auth-screen" class="overlay">
    <div class="auth-box">
        <h2>PLATFORM LOGIN</h2>
        <input type="email" id="email" placeholder="이메일 주소 (@ 포함 필수)">
        <input type="password" id="password" placeholder="비밀번호">
        <button class="btn-blue" onclick="handleAuth('login')">기존 계정 로그인</button>
        <button class="btn-green" onclick="handleAuth('signup')">신규 아바타 생성 (회원가입)</button>
    </div>
</div>

<div id="web-home">
    <main>
        <div class="section-title">최근 플레이한 월드 (Continue)</div>
        <div class="game-grid">
            <div class="game-card" onclick="startGame('rainbow')">
                <div class="game-thumb" style="background: linear-gradient(135deg, #FF007A, #9600FF);">🌈</div>
                <div class="game-info">
                    <div class="game-name">무지개 점프맵 (Obby)</div>
                    <div class="game-stats"><span class="rating">👍 94%</span> <span>👤 14.8K</span></div>
                </div>
            </div>
            <div class="game-card" onclick="startGame('disaster')">
                <div class="game-thumb" style="background: linear-gradient(135deg, #3A3D40, #181A1B);">🌪️</div>
                <div class="game-info">
                    <div class="game-name">자연재해 서바이벌</div>
                    <div class="game-stats"><span class="rating">👍 89%</span> <span>👤 41.2K</span></div>
                </div>
            </div>
        </div>

        <div class="section-title">실시간 추천 유명 인기 게임 (Popular Hub)</div>
        <div class="game-grid">
            <div class="game-card" onclick="startGame('doors')">
                <div class="game-thumb" style="background: linear-gradient(135deg, #0F141C, #05070A);">👁️‍🗨️</div>
                <div class="game-info">
                    <div class="game-name">DOORS (도어즈 레플리카)</div>
                    <div class="game-stats"><span class="rating">👍 96%</span> <span style="color:#FF3366; font-weight:bold;">🔥 HORROR</span></div>
                </div>
            </div>
            <div class="game-card" onclick="startGame('brookhaven')">
                <div class="game-thumb" style="background: linear-gradient(135deg, #56CCF2, #2F80ED);">🏡</div>
                <div class="game-info">
                    <div class="game-name">브룩헤이번 (Brookhaven RP)</div>
                    <div class="game-stats"><span class="rating">👍 92%</span> <span style="color:#00E676; font-weight:bold;">🏙️ TOWN</span></div>
                </div>
            </div>
        </div>
    </main>

    <aside class="friends-panel">
        <div style="font-size: 17px; font-weight: 800; margin-bottom: 15px; color:var(--accent-blue);">👥 LIVE SOCIAL CENTER</div>
        <div class="friend-search-box">
            <input type="text" id="target-user-input" placeholder="상대방 이메일 ID 검색">
            <button onclick="sendFriendRequest()">친추</button>
        </div>
        <div style="font-size: 14px; font-weight: bold; margin: 25px 0 10px 0; color: #ffb703;">🔔 수신된 친추 요청</div>
        <ul id="request-list" class="friend-list"></ul>
        <div style="font-size: 14px; font-weight: bold; margin: 25px 0 10px 0; color: var(--accent-green);">💚 내 친구 목록 (ONLINE)</div>
        <ul id="my-friend-list" class="friend-list"></ul>
    </aside>
</div>

<div id="game-container"></div>
<button id="back-to-home" onclick="exitGame()">🏠 리브 (Leave Game)</button>

<div id="chat-ui">
    <ul id="chat-messages"></ul>
    <div id="chat-input-box">
        <input type="text" id="chat-input" placeholder="안전하게 채팅하려면 입력...">
        <button id="chat-send" onclick="sendChat()">전송</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set, update, onValue, remove, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDmVSOU_1iEfYdH01axEDXhhCiCnoxIJEc",
        authDomain: "roblox-fe012.firebaseapp.com",
        databaseURL: "https://roblox-fe012-default-rtdb.firebaseio.com",
        projectId: "roblox-fe012",
        storageBucket: "roblox-fe012.firebasestorage.app",
        messagingSenderId: "139193121150",
        appId: "1:139193121150:web:e61ca8ac6a5d0b80b35b2f",
        measurementId: "G-X8JYFB29D8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let myUid = ""; let myName = "";

    window.handleAuth = async (type) => {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();
        if(!email || !password) return;
        try {
            if (type === 'login') {
                await signInWithEmailAndPassword(auth, email, password);
            } else {
                const cred = await createUserWithEmailAndPassword(auth, email, password);
                await set(ref(db, `users/${cred.user.uid}`), { email: email, name: email.split('@')[0], status: "online" });
            }
        } catch (e) { alert("인증 처리 실패: " + e.message); }
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            myUid = user.uid; myName = user.email.split('@')[0];
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('user-display').innerText = `👤 ${myName}`;
            update(ref(db, `users/${myUid}`), { status: "online", name: myName, email: user.email });
            listenToFriendRequests(); listenToFriendList();
        }
    });

    window.sendFriendRequest = function() {
        const em = document.getElementById('target-user-input').value.trim();
        if(!em || em === auth.currentUser.email) return;
        onValue(ref(db, 'users'), (snap) => {
            let tUid = null; snap.forEach((c) => { if(c.val().email === em) tUid = c.key; });
            if(tUid) {
                set(ref(db, `friendRequests/${tUid}/${myUid}`), { fromName: myName, fromEmail: auth.currentUser.email });
                alert("실시간 친추 요청을 전송했습니다.");
                document.getElementById('target-user-input').value = "";
            } else alert("가입되지 않은 이메일입니다.");
        }, { onlyOnce: true });
    };

    function listenToFriendRequests() {
        onValue(ref(db, `friendRequests/${myUid}`), (snap) => {
            const list = document.getElementById('request-list'); list.innerHTML = "";
            if(!snap.exists()) { list.innerHTML = `<li class='friend-status'>받은 요청이 없습니다.</li>`; return; }
            snap.forEach((c) => {
                const fUid = c.key; const d = c.val();
                const li = document.createElement('li'); li.className = "friend-item";
                li.innerHTML = `<div><div class="friend-name">${d.fromName}</div></div>
                    <div class="req-buttons">
                        <button class="btn-sm-accept" onclick="acceptFriend('${fUid}', '${d.fromName}')">수락</button>
                        <button class="btn-sm-decline" onclick="declineFriend('${fUid}')">거절</button>
                    </div>`;
                list.appendChild(li);
            });
        });
    }

    window.acceptFriend = function(fUid, fName) {
        const u = {}; u[`friends/${myUid}/${fUid}`] = { name: fName }; u[`friends/${fUid}/${myUid}`] = { name: myName };
        update(ref(db), u).then(() => remove(ref(db, `friendRequests/${myUid}/${fUid}`)));
    };
    window.declineFriend = function(fUid) { remove(ref(db, `friendRequests/${myUid}/${fUid}`)); };

    function listenToFriendList() {
        onValue(ref(db, `friends/${myUid}`), (snap) => {
            const list = document.getElementById('my-friend-list'); list.innerHTML = "";
            if(!snap.exists()) { list.innerHTML = `<li class='friend-status'>추가된 친구가 없습니다.</li>`; return; }
            snap.forEach((c) => {
                const fUid = c.key; const fData = c.val();
                onValue(ref(db, `users/${fUid}`), (uSnap) => {
                    const st = uSnap.exists() ? uSnap.val().status : "offline";
                    const old = document.getElementById(`f-${fUid}`); if(old) old.remove();
                    const li = document.createElement('li'); li.id = `f-${fUid}`;
                    li.className = `friend-item ${st === 'online' ? 'online' : ''}`;
                    li.innerHTML = `<div><div class="friend-name">👤 ${fData.name}</div><div class="friend-status">${st === 'online' ? '● 온라인' : '○ 오프라인'}</div></div>`;
                    list.appendChild(li);
                });
            });
        });
    }

    // --- 🎮 [하이엔드 통합] 3D 그래픽스 및 4대 명작 테마 월드 코어 ---
    let scene, camera, renderer, player, animationId;
    let collidableObjects = [];
    let move = { w: false, a: false, s: false, d: false, space: false };
    let isRightMouseDown = false;
    let velocityY = 0, isJumping = false, pitch = 0, yaw = 0;

    let leftUpperLeg, leftLowerLeg, rightUpperLeg, rightLowerLeg;
    let leftUpperArm, leftLowerArm, rightUpperArm, rightLowerArm;
    let bodyUpper, headNode;

    window.startGame = function(gameType) {
        document.getElementById('web-home').style.display = 'none';
        document.getElementById('game-container').style.display = 'block';
        document.getElementById('chat-ui').style.display = 'block';
        document.getElementById('back-to-home').style.display = 'block';
        initEngine(gameType);
        initChat();
    };

    window.exitGame = function() {
        cancelAnimationFrame(animationId);
        if (renderer) { renderer.dispose(); document.getElementById('game-container').innerHTML = ""; }
        document.getElementById('web-home').style.display = 'grid';
        document.getElementById('game-container').style.display = 'none';
        document.getElementById('chat-ui').style.display = 'none';
        document.getElementById('back-to-home').style.display = 'none';
        collidableObjects = [];
    };

    function initEngine(type) {
        scene = new THREE.Scene();
        
        // 월드별 특화 환경 광원 및 미스트 필터 셋업
        if(type === 'doors') {
            scene.background = new THREE.Color(0x050508);
            scene.fog = new THREE.FogExp2(0x050508, 0.08); // 공포 필터 Fog 효과
        } else if(type === 'brookhaven') {
            scene.background = new THREE.Color(0x7ec0ee); // 화창한 도시 하늘
        } else {
            scene.background = new THREE.Color(type === 'rainbow' ? 0x87CEEB : 0x222222);
        }
        
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('game-container').appendChild(renderer.domElement);

        // 하이 퀄리티 조명 시스템 설정
        const light = new THREE.DirectionalLight(0xffffff, type === 'doors' ? 0.3 : 1.3);
        light.position.set(30, 50, 20);
        scene.add(light);
        scene.add(new THREE.AmbientLight(type === 'doors' ? 0x111116 : 0x777777));

        // 고퀄리티 캐릭터 및 커스텀 월드 생성 호출
        createHighQualityR15Player();
        buildCustomWorld(type);

        window.addEventListener('keydown', onKeyDown);
        window.addEventListener('keyup', onKeyUp);
        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('mousedown', () => isRightMouseDown = true);
        window.addEventListener('mouseup', () => isRightMouseDown = false);

        animate();
    }

    // 뼈대 및 비주얼 퀄리티가 대폭 강화된 R15 아바타 모델러
    function createHighQualityR15Player() {
        player = new THREE.Group();
        const skinMat = new THREE.MeshStandardMaterial({ color: 0xffe0bd, roughness: 0.25 });
        const torsoMat = new THREE.MeshStandardMaterial({ color: 0x0084FF, roughness: 0.3 }); // 기본 파란 로블록스 셔츠
        const pantsMat = new THREE.MeshStandardMaterial({ color: 0x222529, roughness: 0.4 });
        const hairMat = new THREE.MeshStandardMaterial({ color: 0x2b1d10, roughness: 0.5 });

        // Lower Torso
        const lowerTorso = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.4, 0.5), torsoMat);
        lowerTorso.position.y = 0.9; player.add(lowerTorso);

        // Upper Torso
        bodyUpper = new THREE.Mesh(new THREE.BoxGeometry(0.86, 0.6, 0.52), torsoMat);
        bodyUpper.position.y = 0.5; lowerTorso.add(bodyUpper);

        // Head + Face Ray Layer
        headNode = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), skinMat);
        headNode.position.y = 0.6; bodyUpper.add(headNode);

        // 고급 헤어 디테일 가닥 메쉬 공정
        for(let i=0; i<6; i++) {
            const h = new THREE.Mesh(new THREE.BoxGeometry(0.56, 0.09, 0.58), hairMat);
            h.position.set(0, 0.25 + (i*0.02), -0.04); h.rotation.x = 0.1; headNode.add(h);
        }

        // R15 사지 분할 세팅
        leftUpperLeg = new THREE.Group(); leftUpperLeg.position.set(-0.22, -0.2, 0); lowerTorso.add(leftUpperLeg);
        const lul = new THREE.Mesh(new THREE.BoxGeometry(0.34, 0.4, 0.4), pantsMat); lul.position.y = -0.2; leftUpperLeg.add(lul);
        leftLowerLeg = new THREE.Group(); leftLowerLeg.position.set(0, -0.4, 0); leftUpperLeg.add(leftLowerLeg);
        const lll = new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.4, 0.38), skinMat); lll.position.y = -0.2; leftLowerLeg.add(lll);

        rightUpperLeg = new THREE.Group(); rightUpperLeg.position.set(0.22, -0.2, 0); lowerTorso.add(rightUpperLeg);
        const rul = new THREE.Mesh(new THREE.BoxGeometry(0.34, 0.4, 0.4), pantsMat); rul.position.y = -0.2; rightUpperLeg.add(rul);
        rightLowerLeg = new THREE.Group(); rightLowerLeg.position.set(0, -0.4, 0); rightUpperLeg.add(rightLowerLeg);
        const rll = new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.4, 0.38), skinMat); rll.position.y = -0.2; rightLowerLeg.add(rll);

        leftUpperArm = new THREE.Group(); leftUpperArm.position.set(-0.56, 0.2, 0); bodyUpper.add(leftUpperArm);
        const lua = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.4, 0.38), torsoMat); lua.position.y = -0.15; leftUpperArm.add(lua);
        leftLowerArm = new THREE.Group(); leftLowerArm.position.set(0, -0.35, 0); leftUpperArm.add(leftLowerArm);
        const lla = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.4, 0.36), skinMat); lla.position.y = -0.15; leftLowerArm.add(lla);

        rightUpperArm = new THREE.Group(); rightUpperArm.position.set(0.56, 0.2, 0); bodyUpper.add(rightUpperArm);
        const rua = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.4, 0.38), torsoMat); rua.position.y = -0.15; rightUpperArm.add(rua);
        rightLowerArm = new THREE.Group(); rightLowerArm.position.set(0, -0.35, 0); rightUpperArm.add(rightLowerArm);
        const rla = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.4, 0.36), skinMat); rla.position.y = -0.15; rightLowerArm.add(rla);

        player.position.set(0, 2, 0); scene.add(player);
    }

    // --- 🗺️ [초고화질 개편] 4종 월드 지형 어셈블러 빌더 ---
    function buildCustomWorld(type) {
        if(type === 'rainbow') {
            // 1. 무지개 점프맵 지형지물 빌드
            const colors = [0xff0055, 0xff7700, 0xffdd00, 0x00ff66, 0x0084ff, 0x7a00ff];
            const startP = new THREE.Mesh(new THREE.BoxGeometry(12, 1, 12), new THREE.MeshStandardMaterial({color: 0x252830, roughness:0.5}));
            startP.position.set(0, -0.5, 0); scene.add(startP); collidableObjects.push(startP);

            for(let i=0; i<30; i++) {
                const pad = new THREE.Mesh(new THREE.BoxGeometry(4.5, 0.6, 4.5), new THREE.MeshStandardMaterial({color: colors[i % colors.length], metalness:0.1}));
                pad.position.set(Math.sin(i * 1.3) * 3.5, i * 0.8, -(i * 5.5) - 8);
                scene.add(pad); collidableObjects.push(pad);
            }
        } 
        else if(type === 'disaster') {
            // 2. 자연재해 서바이벌 섬 및 빌딩 빌드
            const island = new THREE.Mesh(new THREE.CylinderGeometry(40, 45, 2, 32), new THREE.MeshStandardMaterial({color: 0x556B2F, roughness:0.9}));
            island.position.y = -1; scene.add(island); collidableObjects.push(island);

            // 대형 타워 피스 구조물 고도화
            for(let h=0; h<4; h++) {
                const floor = new THREE.Mesh(new THREE.BoxGeometry(16, 4, 16), new THREE.MeshStandardMaterial({color: 0xdddddd, transparent:true, opacity:0.85}));
                floor.position.set(0, h * 5 + 2, 0); scene.add(floor); collidableObjects.push(floor);
                // 기둥들
                const pillar = new THREE.Mesh(new THREE.BoxGeometry(1, 5, 1), new THREE.MeshStandardMaterial({color: 0x333333}));
                pillar.position.set(7, h * 5 + 2, 7); scene.add(pillar);
            }
        } 
        else if(type === 'doors') {
            // 3. DOORS (도어즈 레플리카 호러 호텔 방 구현)
            const floorMat = new THREE.MeshStandardMaterial({color: 0x2b1a09, roughness: 0.8}); // 낡은 카펫/나무 느낌
            const wallMat = new THREE.MeshStandardMaterial({color: 0x1f262e, roughness: 0.9});

            // 길게 이어진 어두운 호텔 복도 레이아웃
            const hallFloor = new THREE.Mesh(new THREE.BoxGeometry(8, 0.5, 100), floorMat);
            hallFloor.position.set(0, -0.25, -45); scene.add(hallFloor); collidableObjects.push(hallFloor);

            // 복도 좌우 벽면 및 천장 쉐이더 배치
            const leftWall = new THREE.Mesh(new THREE.BoxGeometry(0.5, 7, 100), wallMat);
            leftWall.position.set(-4, 3.25, -45); scene.add(leftWall);
            const rightWall = new THREE.Mesh(new THREE.BoxGeometry(0.5, 7, 100), wallMat);
            rightWall.position.set(4, 3.25, -45); scene.add(rightWall);

            // 방마다 배치된 고유 번호 '문' 인덱싱
            for(let d=0; d<5; d++) {
                const doorFrame = new THREE.Mesh(new THREE.BoxGeometry(3, 5, 0.4), new THREE.MeshStandardMaterial({color: 0x4a2e13}));
                doorFrame.position.set(0, 2.25, -(d * 18) - 10); scene.add(doorFrame); collidableObjects.push(doorFrame);

                // 문 위에 희미하게 빛나는 벽등 조명 배치
                const lamp = new THREE.PointLight(0xffaa44, 0.8, 8);
                lamp.position.set(0, 5, -(d * 18) - 10); scene.add(lamp);
            }
        } 
        else if(type === 'brookhaven') {
            // 4. 브룩헤이번 (타운 플레이스 도시 레이아웃 빌드)
            const roadMat = new THREE.MeshStandardMaterial({color: 0x222222, roughness: 0.6});
            const grassMat = new THREE.MeshStandardMaterial({color: 0x4CAF50, roughness: 0.9});

            // 메인 아스팔트 중앙 도로
            const mainRoad = new THREE.Mesh(new THREE.BoxGeometry(16, 0.2, 120), roadMat);
            mainRoad.position.set(0, -0.1, 0); scene.add(mainRoad); collidableObjects.push(mainRoad);

            // 주변 주택가 잔디밭 블록 필드
            const lawnL = new THREE.Mesh(new THREE.BoxGeometry(40, 0.2, 120), grassMat);
            lawnL.position.set(-28, -0.1, 0); scene.add(lawnL); collidableObjects.push(lawnL);
            const lawnR = new THREE.Mesh(new THREE.BoxGeometry(40, 0.2, 120), grassMat);
            lawnR.position.set(28, -0.1, 0); scene.add(lawnR); collidableObjects.push(lawnR);

            // 브룩헤이번 커스텀 주택(RP House) 랜드마크 모델링 2채 배치
            const house1 = new THREE.Mesh(new THREE.BoxGeometry(14, 8, 14), new THREE.MeshStandardMaterial({color: 0xffffff}));
            house1.position.set(-20, 4, -15); scene.add(house1); collidableObjects.push(house1);
            const roof1 = new THREE.Mesh(new THREE.ConeGeometry(11, 4, 4), new THREE.MeshStandardMaterial({color: 0xCC3333}));
            roof1.position.set(-20, 10, -15); roof1.rotation.y = Math.PI/4; scene.add(roof1);

            const house2 = new THREE.Mesh(new THREE.BoxGeometry(16, 9, 12), new THREE.MeshStandardMaterial({color: 0xFFE0B2}));
            house2.position.set(20, 4.5, -30); scene.add(house2); collidableObjects.push(house2);
        }
    }

    // --- 인게임 제어 및 실시간 렌더링 물리 프레임 루프 ---
    function onKeyDown(e) {
        if(document.activeElement === document.getElementById('chat-input')) return;
        if (e.code === 'KeyW' || e.code === 'ArrowUp') move.w = true;
        if (e.code === 'KeyS' || e.code === 'ArrowDown') move.s = true;
        if (e.code === 'KeyA' || e.code === 'ArrowLeft') move.a = true;
        if (e.code === 'KeyD' || e.code === 'ArrowRight') move.d = true;
        if (e.code === 'Space') move.space = true;
    }
    function onKeyUp(e) {
        if (e.code === 'KeyW' || e.code === 'ArrowUp') move.w = false;
        if (e.code === 'KeyS' || e.code === 'ArrowDown') move.s = false;
        if (e.code === 'KeyA' || e.code === 'ArrowLeft') move.a = false;
        if (e.code === 'KeyD' || e.code === 'ArrowRight') move.d = false;
        if (e.code === 'Space') move.space = false;
    }
    function onMouseMove(e) {
        if (!isRightMouseDown) return;
        yaw -= e.movementX * 0.0045; pitch -= e.movementY * 0.0045;
        pitch = Math.max(-Math.PI/2.4, Math.min(Math.PI/2.4, pitch));
    }

    let walkCycle = 0;
    function animate() {
        animationId = requestAnimationFrame(animate);
        const speed = 0.16; let mX = 0; let mZ = 0;

        if (move.w) { mX -= Math.sin(yaw); mZ -= Math.cos(yaw); }
        if (move.s) { mX += Math.sin(yaw); mZ += Math.cos(yaw); }
        if (move.a) { mX -= Math.cos(yaw); mZ += Math.sin(yaw); }
        if (move.d) { mX += Math.cos(yaw); mZ -= Math.sin(yaw); }

        if (move.w || move.s || move.a || move.d) {
            const len = Math.sqrt(mX * mX + mZ * mZ);
            player.position.x += (mX / len) * speed; player.position.z += (mZ / len) * speed;
            player.rotation.y = Math.atan2(mX, mZ);

            walkCycle += 0.22;
            leftUpperLeg.rotation.x = Math.sin(walkCycle) * 0.55;
            rightUpperLeg.rotation.x = -Math.sin(walkCycle) * 0.55;
            leftUpperArm.rotation.x = -Math.sin(walkCycle) * 0.45;
            rightUpperArm.rotation.x = Math.sin(walkCycle) * 0.45;
        } else {
            leftUpperLeg.rotation.x *= 0.75; rightUpperLeg.rotation.x *= 0.75;
            leftUpperArm.rotation.x *= 0.75; rightUpperArm.rotation.x *= 0.75;
        }

        // 레이 트레이싱 정밀 충돌 연산
        const ray = new THREE.Raycaster();
        ray.set(new THREE.Vector3(player.position.x, player.position.y + 1.0, player.position.z), new THREE.Vector3(0, -1, 0));
        const hits = ray.intersectObjects(collidableObjects);

        let groundOn = false; let groundY = -999;
        if (hits.length > 0 && hits[0].distance <= 1.06 + Math.abs(velocityY)) {
            groundY = hits[0].point.y; groundOn = true;
        }

        if (move.space && !isJumping && groundOn) { velocityY = 0.26; isJumping = true; }

        if (isJumping || !groundOn) {
            player.position.y += velocityY; velocityY -= 0.013;
            if (velocityY <= 0 && groundOn && player.position.y <= groundY) {
                player.position.y = groundY; isJumping = false; velocityY = 0;
            }
        } else if (groundOn) { player.position.y = groundY; velocityY = 0; isJumping = false; }

        if (player.position.y < -20) { player.position.set(0, 3, 0); velocityY = 0; isJumping = false; }

        const rad = 10.0;
        const targetOffset = new THREE.Vector3(rad * Math.sin(yaw) * Math.cos(pitch), rad * Math.sin(pitch) + 2.0, rad * Math.cos(yaw) * Math.cos(pitch));
        camera.position.copy(player.position).add(targetOffset);
        camera.lookAt(player.position.x, player.position.y + 1.3, player.position.z);

        renderer.render(scene, camera);
    }

    function initChat() {
        const cRef = ref(db, 'messages'); const log = document.getElementById('chat-messages'); log.innerHTML = "";
        onChildAdded(cRef, (d) => {
            const m = d.val(); const li = document.createElement('li'); li.style.marginBottom = "6px";
            li.innerHTML = `<span style="color: #00f2ff; font-weight:bold;">[${m.user}]</span>: ${m.text}`;
            log.appendChild(li); log.scrollTop = log.scrollHeight;
        });
    }

    window.sendChat = async () => {
        const input = document.getElementById('chat-input'); if (!input.value.trim()) return;
        await set(push(ref(db, 'messages')), { user: myName, text: input.value, timestamp: Date.now() });
        input.value = "";
    };

    document.getElementById('chat-input').addEventListener('keydown', (e) => { if(e.code === 'Enter') window.sendChat(); });
    window.addEventListener('beforeunload', () => { if(myUid) update(ref(db, `users/${myUid}`), { status: "offline" }); });
</script>
