<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>ROBLOX NEXT-GEN - 프리미엄 4대 명작 통합 엔진</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --bg-main: #0B0C0E;
            --bg-panel: #1B1D22;
            --bg-card: #252830;
            --text-color: #FFFFFF;
            --accent-blue: #0084FF;
            --accent-green: #00E676;
            --accent-red: #FF3366;
        }

        body { margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg-main); color: var(--text-color); user-select: none; overflow-x: hidden; }
        
        header { background: var(--bg-panel); height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); position: relative; z-index: 20; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo { font-size: 22px; font-weight: 900; color: #FFF; letter-spacing: -1px; }
        .user-tag { background: rgba(0, 132, 255, 0.15); border: 1px solid var(--accent-blue); padding: 8px 18px; border-radius: 20px; font-size: 13px; font-weight: bold; color: #00f2ff; }

        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: radial-gradient(circle, #1b1d22 0%, #0b0c0e 100%); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .auth-box { background: var(--bg-panel); padding: 45px; border-radius: 16px; width: 360px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.05); }
        .auth-box h2 { margin-top: 0; font-size: 26px; color: #FFF; font-weight: 800; margin-bottom: 25px; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; box-sizing: border-box; background: var(--bg-main); color: #FFF; font-size: 14px; }
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 6px 0; font-size: 15px; transition: 0.2s; }
        .btn-blue { background: var(--accent-blue); color: white; }
        .btn-green { background: var(--accent-green); color: #000; }
        .btn-gray { background: #444; color: #fff; }

        #web-home { max-width: 1400px; margin: 0 auto; padding: 30px 20px; display: grid; grid-template-columns: 1fr 340px; gap: 30px; }
        .section-title { font-size: 22px; font-weight: 800; margin: 25px 0 15px 0; border-left: 5px solid var(--accent-blue); padding-left: 12px; }

        .friends-panel { background: var(--bg-panel); border-radius: 14px; padding: 24px; box-shadow: 0 8px 30px rgba(0,0,0,0.3); height: calc(100vh - 160px); overflow-y: auto; border: 1px solid rgba(255,255,255,0.03); }
        .friend-search-box { display: flex; gap: 8px; }
        .friend-search-box input { margin: 0; padding: 12px; }
        .friend-search-box button { width: 70px; margin: 0; background: var(--accent-blue); color: white; border-radius: 8px; }
        .friend-list { list-style: none; padding: 0; margin: 0; }
        .friend-item { display: flex; align-items: center; justify-content: space-between; background: var(--bg-card); padding: 14px; border-radius: 10px; margin-bottom: 10px; }

        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .game-card { background: var(--bg-panel); border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.25s ease-out; border: 1px solid rgba(255,255,255,0.03); }
        .game-card:hover { transform: translateY(-6px); border-color: var(--accent-blue); box-shadow: 0 12px 24px rgba(0,132,255,0.2); }
        .game-thumb { height: 130px; display: flex; align-items: center; justify-content: center; font-size: 55px; }
        .game-info { padding: 14px; }
        .game-name { font-size: 15px; font-weight: bold; margin: 0 0 6px 0; }
        .game-stats { font-size: 12px; color: #a0a5b5; display: flex; justify-content: space-between; }
        .rating { color: #FFD700; font-weight: bold; }

        #game-container { width: 100vw; height: 100vh; display: none; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #disaster-ticker { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: rgba(255, 51, 102, 0.9); color: white; padding: 12px 35px; border-radius: 30px; font-weight: 900; font-size: 18px; z-index: 40; display: none; box-shadow: 0 4px 20px rgba(255,51,102,0.5); letter-spacing: 1px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.9; } 50% { opacity: 1; transform: translateX(-50%) scale(1.05); } 100% { opacity: 0.9; } }

        #chat-ui { position: fixed; bottom: 25px; left: 25px; width: 380px; z-index: 30; display: none; }
        #chat-messages { height: 180px; background: rgba(11,12,14,0.8); color: white; overflow-y: auto; padding: 12px; border-radius: 8px; list-style: none; margin: 0; font-size: 14px; }
        #chat-input-box { display: flex; margin-top: 8px; }
        #chat-input { flex: 1; padding: 12px; border-radius: 8px 0 0 8px; margin: 0; background: rgba(0,0,0,0.6); color: #fff; border: 1px solid rgba(255,255,255,0.1); }
        #chat-send { width: 70px; border-radius: 0 8px 8px 0; background: var(--accent-blue); color: white; margin: 0; }
        #back-to-home { position: fixed; top: 80px; left: 25px; z-index: 30; width: 150px; background: var(--accent-red); color: white; display: none; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="logo">🔴 ROBLOX 2026 NEXT-GEN</div>
    <div id="user-display" class="user-tag">계정 접속 대기중</div>
</header>

<div id="auth-screen" class="overlay">
    <div class="auth-box">
        <h2>ROBLOX LOGIN</h2>
        <input type="text" id="email" placeholder="사용자 ID 또는 이메일">
        <input type="password" id="password" placeholder="비밀번호 (4자리 이상)">
        <button class="btn-blue" onclick="handleAuth('login')">로그인</button>
        <button class="btn-green" onclick="handleAuth('signup')">회원가입</button>
        <button class="btn-gray" onclick="handleGuestLogin()">게스트로 즉시 입장</button>
    </div>
</div>

<div id="disaster-ticker">🚨 긴급 재해 경보: 대기 중</div>

<div id="web-home">
    <main>
        <div class="section-title">계속하기 (Continue)</div>
        <div class="game-grid">
            <div class="game-card" onclick="startGame('rainbow')">
                <div class="game-thumb" style="background: linear-gradient(135deg, #FF416C, #FF4B2B);">🌈</div>
                <div class="game-info">
                    <div class="game-name">무지개 점프맵</div>
                    <div class="game-stats"><span class="rating">👍 94%</span> <span>👤 12.5K</span></div>
                </div>
            </div>
            <div class="game-card" onclick="startGame('disaster')">
                <div class="game-thumb" style="background: linear-gradient(135deg, #3A3D40, #181A1B);">🌪️</div>
                <div class="game-info">
                    <div class="game-name">자연재해 서바이벌 (실시간 파괴)</div>
                    <div class="game-stats"><span class="rating">👍 87%</span> <span>👤 45.2K</span></div>
                </div>
            </div>
        </div>

        <div class="section-title">추천 게임 (Recommended For You)</div>
        <div class="game-grid">
            <div class="game-card" onclick="startGame('brookhaven')">
                <div class="game-thumb" style="background: linear-gradient(135deg, #4AC29A, #BDFFF3);">🏡</div>
                <div class="game-info">
                    <div class="game-name">브룩헤이번 RP (Brookhaven)</div>
                    <div class="game-stats"><span class="rating">👍 89%</span> <span>👤 110K</span></div>
                </div>
            </div>
            <div class="game-card" onclick="startGame('doors')">
                <div class="game-thumb" style="background: linear-gradient(135deg, #232526, #414345);">🚪</div>
                <div class="game-info">
                    <div class="game-name">DOORS (도어즈 레플리카)</div>
                    <div class="game-stats"><span class="rating">👍 95%</span> <span>👤 21.8K</span></div>
                </div>
            </div>
        </div>
    </main>

    <aside class="friends-panel">
        <div style="font-size: 16px; font-weight: 800; margin-bottom: 15px; color:var(--accent-blue);">⚡ 친구 찾기 & 요청</div>
        <div class="friend-search-box">
            <input type="text" id="target-user-input" placeholder="상대방 ID 입력">
            <button onclick="sendFriendRequest()">요청</button>
        </div>
        <div style="font-size: 13px; font-weight: bold; margin: 20px 0 10px 0; color: #ffb703;">🔔 받은 요청 목록</div>
        <ul id="request-list" class="friend-list"></ul>
        <div style="font-size: 13px; font-weight: bold; margin: 20px 0 10px 0; color: var(--accent-green);">💚 내 친구 목록</div>
        <ul id="my-friend-list" class="friend-list"></ul>
    </aside>
</div>

<div id="game-container"></div>
<button id="back-to-home" onclick="exitGame()">🏠 리브 (Leave Game)</button>

<div id="chat-ui">
    <ul id="chat-messages"></ul>
    <div id="chat-input-box">
        <input type="text" id="chat-input" placeholder="채팅 메시지 입력...">
        <button id="chat-send" onclick="sendChat()">전송</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set, update, onValue, remove, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDmVSOU_1iEfYdH01axEDXhhCiCnoxIJEc",
        authDomain: "roblox-fe012.firebaseapp.com",
        databaseURL: "https://roblox-fe012-default-rtdb.firebaseio.com",
        projectId: "roblox-fe012",
        storageBucket: "roblox-fe012.firebasestorage.app",
        messagingSenderId: "139193121150",
        appId: "1:139193121150:web:e61ca8ac6a5d0b80b35b2f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let myUid = ""; let myName = "";

    function formatEmail(input) { return input.includes('@') ? input : `${input}@roblox.com`; }

    window.handleAuth = async (type) => {
        let rawEmail = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();
        if(!rawEmail || !password) return;
        const email = formatEmail(rawEmail);
        try {
            if (type === 'login') { await signInWithEmailAndPassword(auth, email, password); }
            else {
                const cred = await createUserWithEmailAndPassword(auth, email, password);
                await set(ref(db, `users/${cred.user.uid}`), { email: email, name: email.split('@')[0], status: "online" });
            }
        } catch (e) { alert(e.message); }
    };

    window.handleGuestLogin = () => {
        myUid = "guest_" + Math.floor(Math.random()*10000); myName = "Guest_" + myUid.split('_')[1];
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('user-display').innerText = `👤 ${myName} (게스트)`;
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            myUid = user.uid; myName = user.email.split('@')[0];
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('user-display').innerText = `👤 ${myName}`;
        }
    });

    // --- 🎮 3D 물리 월드 및 R15 고정밀 엔진 코어 ---
    let scene, camera, renderer, player, animationId;
    let collidableObjects = [];
    let buildingFloors = [];
    let meteors = [];
    let move = { w: false, a: false, s: false, d: false, space: false };
    let isRightMouseDown = false;
    let velocityY = 0, isJumping = false, pitch = 0, yaw = 0;
    let activeDisaster = "none";
    let disasterTimer = null;

    // R15 파트별 관절 그룹 정의
    let leftUpperLeg, leftLowerLeg, rightUpperLeg, rightLowerLeg;
    let leftUpperArm, leftLowerArm, rightUpperArm, rightLowerArm;
    let bodyUpper, headNode;

    // 우클릭할 때 컨텍스트 팝업 뜨는 브라우저 기본 동작 차단
    window.addEventListener('contextmenu', (e) => {
        e.preventDefault();
    });

    window.startGame = function(gameType) {
        document.getElementById('web-home').style.display = 'none';
        document.getElementById('game-container').style.display = 'block';
        document.getElementById('chat-ui').style.display = 'block';
        document.getElementById('back-to-home').style.display = 'block';
        if(gameType === 'disaster') document.getElementById('disaster-ticker').style.display = 'block';
        initEngine(gameType);
    };

    window.exitGame = function() {
        cancelAnimationFrame(animationId);
        clearInterval(disasterTimer);
        if (renderer) { renderer.dispose(); document.getElementById('game-container').innerHTML = ""; }
        document.getElementById('web-home').style.gridTemplateColumns = "1fr 340px";
        document.getElementById('web-home').style.display = 'grid';
        document.getElementById('game-container').style.display = 'none';
        document.getElementById('chat-ui').style.display = 'none';
        document.getElementById('back-to-home').style.display = 'none';
        document.getElementById('disaster-ticker').style.display = 'none';
        collidableObjects = []; buildingFloors = []; meteors = [];
        activeDisaster = "none";
    };

    function initEngine(type) {
        scene = new THREE.Scene();
        if(type === 'disaster') {
            scene.background = new THREE.Color(0x3A3D40);
            scene.fog = new THREE.FogExp2(0x3A3D40, 0.015);
        } else if(type === 'brookhaven') {
            scene.background = new THREE.Color(0x7ec0ee);
        } else if(type === 'doors') {
            scene.background = new THREE.Color(0x050508);
            scene.fog = new THREE.FogExp2(0x050508, 0.08);
        } else {
            scene.background = new THREE.Color(0x87CEEB);
        }
        
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.getElementById('game-container').appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(20, 40, 20);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // 🤖 고퀄리티 R15 레고 아바타 구조 탑재
        createHighQualityR15Player();

        buildCustomWorld(type);

        window.addEventListener('keydown', onKeyDown);
        window.addEventListener('keyup', onKeyUp);
        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('mousedown', (e) => { if(e.button === 2) isRightMouseDown = true; });
        window.addEventListener('mouseup', (e) => { if(e.button === 2) isRightMouseDown = false; });

        animate();

        if(type === 'disaster') {
            triggerNextDisaster();
            disasterTimer = setInterval(triggerNextDisaster, 15000);
        }
    }

    function createHighQualityR15Player() {
        player = new THREE.Group();

        const skinMat = new THREE.MeshStandardMaterial({ color: 0xffe0bd, roughness: 0.3 });
        const torsoMat = new THREE.MeshStandardMaterial({ color: 0xe63946, roughness: 0.4 });
        const pantsMat = new THREE.MeshStandardMaterial({ color: 0x1d3557, roughness: 0.5 });
        const hairMat = new THREE.MeshStandardMaterial({ color: 0x3d2314, roughness: 0.6 });

        // 골반 하부 몸통
        const lowerTorso = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.4, 0.5), torsoMat);
        lowerTorso.position.y = 0.9;
        lowerTorso.castShadow = true;
        player.add(lowerTorso);

        // 상체 몸통
        bodyUpper = new THREE.Mesh(new THREE.BoxGeometry(0.85, 0.6, 0.52), torsoMat);
        bodyUpper.position.y = 0.5;
        bodyUpper.castShadow = true;
        lowerTorso.add(bodyUpper);

        // 머리 노드
        headNode = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), skinMat);
        headNode.position.y = 0.6;
        headNode.castShadow = true;
        bodyUpper.add(headNode);

        // 헤어 스타일 레이어 연출
        for(let i=0; i<5; i++) {
            const h = new THREE.Mesh(new THREE.BoxGeometry(0.56, 0.08, 0.56), hairMat);
            h.position.set(0, 0.26 + (i*0.03), -0.02);
            h.rotation.y = i * 0.25 - 0.5;
            headNode.add(h);
        }

        // 왼다리 파트 (상/하단 관절 구조)
        leftUpperLeg = new THREE.Group(); leftUpperLeg.position.set(-0.22, -0.2, 0); lowerTorso.add(leftUpperLeg);
        const lulMesh = new THREE.Mesh(new THREE.BoxGeometry(0.34, 0.4, 0.4), pantsMat); lulMesh.position.y = -0.2; lulMesh.castShadow = true; leftUpperLeg.add(lulMesh);
        leftLowerLeg = new THREE.Group(); leftLowerLeg.position.set(0, -0.4, 0); leftUpperLeg.add(leftLowerLeg);
        const lllMesh = new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.4, 0.38), skinMat); lllMesh.position.y = -0.2; lllMesh.castShadow = true; leftLowerLeg.add(lllMesh);

        // 오른다리 파트 (상/하단 관절 구조)
        rightUpperLeg = new THREE.Group(); rightUpperLeg.position.set(0.22, -0.2, 0); lowerTorso.add(rightUpperLeg);
        const rulMesh = new THREE.Mesh(new THREE.BoxGeometry(0.34, 0.4, 0.4), pantsMat); rulMesh.position.y = -0.2; rulMesh.castShadow = true; rightUpperLeg.add(rulMesh);
        rightLowerLeg = new THREE.Group(); rightLowerLeg.position.set(0, -0.4, 0); rightUpperLeg.add(rightLowerLeg);
        const rllMesh = new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.4, 0.38), skinMat); rllMesh.position.y = -0.2; rllMesh.castShadow = true; rightLowerLeg.add(rllMesh);

        // 왼팔 파트
        leftUpperArm = new THREE.Group(); leftUpperArm.position.set(-0.55, 0.2, 0); bodyUpper.add(leftUpperArm);
        const luaMesh = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.4, 0.38), torsoMat); luaMesh.position.y = -0.15; luaMesh.castShadow = true; leftUpperArm.add(luaMesh);
        leftLowerArm = new THREE.Group(); leftLowerArm.position.set(0, -0.35, 0); leftUpperArm.add(leftLowerArm);
        const llaMesh = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.4, 0.36), skinMat); llaMesh.position.y = -0.15; llaMesh.castShadow = true; leftLowerArm.add(llaMesh);

        // 오른팔 파트
        rightUpperArm = new THREE.Group(); rightUpperArm.position.set(0.55, 0.2, 0); bodyUpper.add(rightUpperArm);
        const ruaMesh = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.4, 0.38), torsoMat); ruaMesh.position.y = -0.15; ruaMesh.castShadow = true; rightUpperArm.add(ruaMesh);
        rightLowerArm = new THREE.Group(); rightLowerArm.position.set(0, -0.35, 0); rightUpperArm.add(rightLowerArm);
        const rlaMesh = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.4, 0.36), skinMat); rlaMesh.position.y = -0.15; rlaMesh.castShadow = true; rightLowerArm.add(rlaMesh);

        player.position.set(0, 3, 0);
        scene.add(player);
    }

    function buildCustomWorld(type) {
        if (type === 'disaster') {
            const island = new THREE.Mesh(new THREE.CylinderGeometry(30, 35, 3, 32), new THREE.MeshStandardMaterial({color: 0x556b2f, roughness: 0.9}));
            island.position.y = -1.5; island.receiveShadow = true; scene.add(island); collidableObjects.push(island);

            const floorColors = [0xdddddd, 0xbbbbbb, 0x999999, 0x777777, 0x555555];
            for(let i=0; i<5; i++) {
                const floor = new THREE.Mesh(new THREE.BoxGeometry(12, 1.5, 12), new THREE.MeshStandardMaterial({color: floorColors[i], roughness: 0.4}));
                floor.position.set(0, i * 4, -4); floor.castShadow = true; floor.receiveShadow = true;
                scene.add(floor); collidableObjects.push(floor); buildingFloors.push(floor);
            }
        } 
        else if (type === 'brookhaven') {
            const lawn = new THREE.Mesh(new THREE.BoxGeometry(150, 1, 150), new THREE.MeshStandardMaterial({color: 0x557a2b, roughness: 0.9}));
            lawn.position.y = -0.5; lawn.receiveShadow = true; scene.add(lawn); collidableObjects.push(lawn);

            const road = new THREE.Mesh(new THREE.BoxGeometry(20, 1.1, 150), new THREE.MeshStandardMaterial({color: 0x333333}));
            road.position.set(0, -0.45, 0); road.receiveShadow = true; scene.add(road); collidableObjects.push(road);

            const house1 = new THREE.Mesh(new THREE.BoxGeometry(12, 8, 12), new THREE.MeshStandardMaterial({color: 0xfffdd0}));
            house1.position.set(-20, 4, -10); house1.castShadow = true; house1.receiveShadow = true; scene.add(house1); collidableObjects.push(house1);
            const roof1 = new THREE.Mesh(new THREE.ConeGeometry(9, 4, 4), new THREE.MeshStandardMaterial({color: 0xcc3333}));
            roof1.position.set(-20, 10, -10); roof1.rotation.y = Math.PI/4; roof1.castShadow = true; scene.add(roof1);

            const house2 = new THREE.Mesh(new THREE.BoxGeometry(14, 10, 10), new THREE.MeshStandardMaterial({color: 0x4a90e2}));
            house2.position.set(22, 5, 15); house2.castShadow = true; house2.receiveShadow = true; scene.add(house2); collidableObjects.push(house2);

            for(let z = -50; z <= 50; z += 35) {
                if(z === 0) continue;
                const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 6), new THREE.MeshStandardMaterial({color: 0x777777}));
                pole.position.set(-11, 3, z); pole.castShadow = true; scene.add(pole); collidableObjects.push(pole);
                const lightBulb = new THREE.Mesh(new THREE.SphereGeometry(0.4, 8, 8), new THREE.MeshBasicMaterial({color: 0xffea00}));
                lightBulb.position.set(-11, 6, z); scene.add(lightBulb);
            }
        }
        else if (type === 'rainbow') {
            const colors = [0xff0000, 0xff7f00, 0xffff00, 0x00ff00, 0x0000ff, 0x4b0082, 0x8b00ff];
            for(let i=0; i<30; i++) {
                const pad = new THREE.Mesh(new THREE.BoxGeometry(4, 0.6, 4), new THREE.MeshStandardMaterial({color: colors[i % colors.length]}));
                pad.position.set(Math.sin(i * 1.2) * 2.5, i * 0.75, -(i * 5.0) - 7);
                pad.receiveShadow = true; pad.castShadow = true;
                scene.add(pad); collidableObjects.push(pad);
            }
        }
        else if (type === 'doors') {
            const floor = new THREE.Mesh(new THREE.BoxGeometry(15, 1, 80), new THREE.MeshStandardMaterial({color: 0x4a2e1b, roughness:0.8}));
            floor.position.set(0, -0.5, -30); floor.receiveShadow = true; scene.add(floor); collidableObjects.push(floor);

            for(let i=0; i<4; i++) {
                const wallL = new THREE.Mesh(new THREE.BoxGeometry(1, 8, 20), new THREE.MeshStandardMaterial({color: 0x3a2010}));
                wallL.position.set(-7.5, 3.5, -10 - (i*20)); wallL.castShadow = true; scene.add(wallL); collidableObjects.push(wallL);
                const wallR = new THREE.Mesh(new THREE.BoxGeometry(1, 8, 20), new THREE.MeshStandardMaterial({color: 0x3a2010}));
                wallR.position.set(7.5, 3.5, -10 - (i*20)); wallR.castShadow = true; scene.add(wallR); collidableObjects.push(wallR);
            }
        }
    }

    function triggerNextDisaster() {
        const disasters = ["화재 (Fire)", "유성우 (Meteor)", "토네이도 (Tornado)"];
        const select = disasters[Math.floor(Math.random() * disasters.length)];
        activeDisaster = select;
        document.getElementById('disaster-ticker').innerText = `🚨 긴급 재해 경보: [${select}] 발생! 안전한 곳으로 대피하세요!`;
        
        if(select.includes("화재")) {
            buildingFloors.forEach(f => f.material.color.setHex(0xff5533));
        } else {
            buildingFloors.forEach((f, idx) => f.material.color.setHex([0xdddddd, 0xbbbbbb, 0x999999, 0x777777, 0x555555][idx]));
        }
    }

    function onKeyDown(e) {
        if (e.code === 'KeyW' || e.code === 'ArrowUp') move.w = true; 
        if (e.code === 'KeyS' || e.code === 'ArrowDown') move.s = true;
        if (e.code === 'KeyA' || e.code === 'ArrowLeft') move.a = true; 
        if (e.code === 'KeyD' || e.code === 'ArrowRight') move.d = true;
        if (e.code === 'Space') move.space = true;
    }
    function onKeyUp(e) {
        if (e.code === 'KeyW' || e.code === 'ArrowUp') move.w = false; 
        if (e.code === 'KeyS' || e.code === 'ArrowDown') move.s = false;
        if (e.code === 'KeyA' || e.code === 'ArrowLeft') move.a = false; 
        if (e.code === 'KeyD' || e.code === 'ArrowRight') move.d = false;
        if (e.code === 'Space') move.space = false;
    }
    function onMouseMove(e) {
        if (!isRightMouseDown) return;
        yaw -= e.movementX * 0.005; pitch -= e.movementY * 0.005;
        pitch = Math.max(-Math.PI/2.4, Math.min(Math.PI/2.4, pitch));
    }

    let tick = 0;
    let walkCycle = 0;

    function animate() {
        animationId = requestAnimationFrame(animate);
        tick += 0.05;

        // 1. 역학 이동 및 물리 제어
        const speed = 0.14; let mx = 0; let mz = 0;
        const isMoving = move.w || move.s || move.a || move.d;

        if (move.w) { mx -= Math.sin(yaw); mz -= Math.cos(yaw); }
        if (move.s) { mx += Math.sin(yaw); mz += Math.cos(yaw); }
        if (move.a) { mx -= Math.cos(yaw); mz += Math.sin(yaw); }
        if (move.d) { mx += Math.cos(yaw); mz -= Math.sin(yaw); }

        if (isMoving) {
            const len = Math.sqrt(mx*mx + mz*mz);
            player.position.x += (mx/len)*speed; player.position.z += (mz/len)*speed;
            player.rotation.y = Math.atan2(mx, mz);

            // R15 관절 연동 흔들림 주파수 매핑
            walkCycle += 0.18;
            const leftAngle = Math.sin(walkCycle);
            const rightAngle = -Math.sin(walkCycle);

            leftUpperLeg.rotation.x = leftAngle * 0.5;
            rightUpperLeg.rotation.x = rightAngle * 0.5;
            leftLowerLeg.rotation.x = Math.max(0, -leftAngle) * 0.4;
            rightLowerLeg.rotation.x = Math.max(0, -rightAngle) * 0.4;

            leftUpperArm.rotation.x = rightAngle * 0.4;
            rightUpperArm.rotation.x = leftAngle * 0.4;
            leftLowerArm.rotation.x = -Math.abs(leftAngle) * 0.2;
            rightLowerArm.rotation.x = -Math.abs(rightAngle) * 0.2;
        } else {
            // 정지 마찰 복원 제어
            leftUpperLeg.rotation.x *= 0.8; rightUpperLeg.rotation.x *= 0.8;
            leftLowerLeg.rotation.x *= 0.8; rightLowerLeg.rotation.x *= 0.8;
            leftUpperArm.rotation.x *= 0.8; rightUpperArm.rotation.x *= 0.8;
            leftLowerArm.rotation.x *= 0.8; rightLowerArm.rotation.x *= 0.8;
        }

        // 2. ⚡ [덜덜 떨림 원인 차단] 고정밀 수직 충돌 연산 보정 레이캐스트
        const raycaster = new THREE.Raycaster();
        const curPos = player.position.clone();
        
        // 레이의 중심 원점을 약간 높여서 완전 수직으로 탐사
        raycaster.set(new THREE.Vector3(curPos.x, curPos.y + 1.0, curPos.z), new THREE.Vector3(0, -1, 0));
        const hits = raycaster.intersectObjects(collidableObjects);
        
        let grounded = false; let groundY = -999;
        if(hits.length > 0) {
            const nearest = hits[0];
            // 지터링(바닥 튕김현상)을 원천 차단하기 위한 임계값 정밀 매칭
            if(nearest.distance <= 1.05 + Math.abs(velocityY)) {
                groundY = nearest.point.y;
                grounded = true;
            }
        }

        if (move.space && grounded && !isJumping) { velocityY = 0.24; isJumping = true; }
        if (isJumping || !grounded) {
            player.position.y += velocityY; velocityY -= 0.012; // 중력 가속도
            if(velocityY <= 0 && grounded && player.position.y <= groundY) {
                player.position.y = groundY; isJumping = false; velocityY = 0;
            }
        } else if(grounded) { 
            player.position.y = groundY; // 정지 상태 또는 이동 중 완벽 밀착 유도
            velocityY = 0; 
            isJumping = false; 
        }

        if(player.position.y < -15) { player.position.set(0, 3, 0); velocityY = 0; isJumping = false; }

        // 자연재해 연산 효과
        if(activeDisaster.includes("화재")) {
            buildingFloors.forEach((f, idx) => { if(idx > 1) { f.position.y -= 0.005; f.rotation.z = Math.sin(tick + idx) * 0.05; } });
        } 
        else if(activeDisaster.includes("토네이도")) {
            buildingFloors.forEach((f, idx) => { f.position.x += Math.sin(tick + idx) * 0.03; f.position.z += Math.cos(tick + idx) * 0.03; f.rotation.y += 0.01 * idx; });
        } 
        else if(activeDisaster.includes("유성우")) {
            if(Math.random() < 0.08) {
                const met = new THREE.Mesh(new THREE.SphereGeometry(0.5, 8, 8), new THREE.MeshBasicMaterial({color: 0xffaa00}));
                met.position.set((Math.random()-0.5)*40, 25, (Math.random()-0.5)*40 - 4); scene.add(met); meteors.push(met);
            }
            for(let i = meteors.length - 1; i >= 0; i--) {
                const m = meteors[i]; m.position.y -= 0.4; m.position.x += 0.05;
                if(m.position.y <= 0) { scene.remove(m); meteors.splice(i, 1); buildingFloors.forEach(f => { f.position.x += (Math.random()-0.5)*0.3; }); }
            }
        }

        // 3인칭 스마트 추적 백뷰 카메라 시스템 
        const dist = 9.5;
        const offset = new THREE.Vector3(dist*Math.sin(yaw)*Math.cos(pitch), dist*Math.sin(pitch)+1.8, dist*Math.cos(yaw)*Math.cos(pitch));
        camera.position.copy(player.position).add(offset);
        camera.lookAt(player.position.x, player.position.y + 1.2, player.position.z);

        renderer.render(scene, camera);
    }
</script>
</body>
